<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background split: left black, right blue -->
  <rect width="100%" height="100%" fill="#1e90ff"/>
  <rect x="0" y="0" width="256" height="512" fill="#000"/>

  <!-- Main circle (sun/moon) centered -->
  <g transform="translate(256,256)">
    <!-- Sun (right) base -->
    <circle r="180" fill="#ffd65a" />

    <!-- Moon crescent overlay (left) -->
    <path d="M0,-180 A180 180 0 0 0 0,180 A140 140 0 0 1 0,-180 Z" fill="#cfcfcf" />

    <!-- Simple craters on moon side -->
    <g fill="#bdbdbd" opacity="0.9">
      <circle cx="-40" cy="-40" r="18" />
      <circle cx="-60" cy="10" r="10" />
      <circle cx="-20" cy="50" r="12" />
    </g>
  </g>
</svg>
